async function runClanMarketAnalysis() {
  if (clanState.running || !clanState.members.length) return;
  if (!clanState.swapDone) { showClanGate(); return; } // swap has priority
  clanState.running = true;
  const btn = document.getElementById("clanMarketBtn");
  btn.disabled = true; btn.textContent = "Анализ...";
  resetStatusProgress("clanActionStatus");
  const config = getClanConfig();
  try {
    let raw;
    if (clanState.marketRaw) {
      raw = clanState.marketRaw; // cached from a previous run this session
      setClanActionStatus(`Анализ рынка: используем кэш — ${formatNumber(raw.length)} листингов...`, "warn", 60);
    } else {
      setClanActionStatus("Анализ рынка: сканируем живые листинги...", "warn", 5);
      raw = await fetchListedClanMarketItems((msg, checked, total) => {
        const pct = total ? clamp(Math.round((checked / total) * 70), 5, 70) : 30;
        setClanActionStatus(msg, "warn", pct);
      });
      clanState.marketRaw = raw;
    }
    let market = raw.map((it) => ({ ...normalizeItem(it, config), salePriceValue: (() => {
      const v = it?.sale?.price?.value; const d = Number(it?.sale?.price?.decimals || 0);
      return v ? Number(v) / Math.pow(10, d) : 0;
    })() })).filter((it) => it.salePriceValue > 0);
    // keep the strongest 120 listings to bound the per-member search
    market = market.sort((a, b) => b.power - a.power).slice(0, 120);
    const owned = new Set();
    clanState.members.forEach((m) => m.items.forEach((it) => owned.add(it.address)));
    const perMember = [];
    for (let i = 0; i < clanState.members.length; i += 1) {
      const m = clanState.members[i];
      setClanActionStatus(`Анализ рынка: участник ${i + 1}/${clanState.members.length}...`, "warn", 70 + Math.round((i / clanState.members.length) * 28));
      const state = clanMemberState(m.items, config); // value = top-3 complete teams
      // buy orcs for any color where a full team exists or is one short of complete
      const usable = new Set();
      for (const [C, v] of state.byTone) if (v.teams.length || v.covered.size >= EMOTIONS.length - 1) usable.add(C);
      const picks = market
        .filter((o) => !owned.has(o.address))
        .filter((o) => usable.has(orcTone(o)))
        .map((o) => ({ orc: o, gain: addValueGain(state, o, config).gain })) // gain to member's full-team value
        .filter((x) => x.gain > 0)
        .sort((a, b) => (b.gain / Math.max(1, b.orc.salePriceValue)) - (a.gain / Math.max(1, a.orc.salePriceValue)) || b.gain - a.gain)
        .slice(0, 3);
      perMember.push({ member: m, picks });
      await sleep(0);
    }
    renderClanMarket(perMember);
    document.getElementById("clan-market").scrollIntoView({ behavior: "smooth", block: "start" });
    const totalBuys = perMember.reduce((s, p) => s + p.picks.length, 0);
    setClanActionStatus(`Анализ рынка готов: ${totalBuys} рекомендаций к покупке у ${perMember.length} участник(ов).`, "ok", 100);
  } catch (error) {
    console.error(error);
    setClanActionStatus(error.message || "Анализ рынка не удался.", "err", 100);
  } finally {
    clanState.running = false;
    btn.disabled = false; btn.textContent = "② Анализ рынка (что докупить)";
  }
}

async function runAnalysis() {
  if (state.isRunning) {
    return;
  }
  state.isRunning = true;
  resetStatusProgress();
  const config = getConfig();
  const startButton = document.getElementById("startAnalysisBtn");
  if (startButton) {
    startButton.disabled = true;
    startButton.textContent = "Analyzing...";
  }

  try {
    const address = await parseCollectionAddress(config.collectionInput);
    setStatus("Starting collection scan...", "warn", 0);
    const totalCount = await fetchCollectionSize(address);

    const fetchResult = await fetchCollectionItems(address, config.pageLimit, config, (message, meta) => {
      setStatus(message, "warn", getFetchProgress(meta?.checkedCount || 0, totalCount));
    });
    const normalized = fetchResult.items.map((item) => normalizeItem(item, config));
    const filtered = normalized;
    setStatus(`Found ${fetchResult.matchedCount} Cavern orcs. Building top 10 teams...`, "warn", 76);
    const topTeams = await buildTopTeams(filtered, config, (message, meta) => {
      setStatus(message, "warn", getBuildProgress(meta?.step || 0, meta?.total || 7));
    });
    const best = topTeams[0] || buildBestTeam(filtered, config);

    state.items = normalized;
    state.filtered = filtered;
    state.topTeams = topTeams;
    state.lastRun = Date.now();

    renderTopTeams(topTeams);

    if (!filtered.length) {
      setStatus("No Cavern orcs found for the current collection.", "err", 100);
      return;
    }

    setStatus(`Done: found ${fetchResult.matchedCount} Cavern orcs and built ${topTeams.length} strongest teams.`, "ok", 100);
  } catch (error) {
    console.error(error);
    setStatus(error.message || "Failed to load collection.", "err", 100);
  } finally {
    state.isRunning = false;
    if (startButton) {
      startButton.disabled = false;
      startButton.textContent = "Start Analysis";
    }
  }
}

function setupTermsPopup() {
  const KEY = "cavern_terms_agreed";
  const pop = document.getElementById("termsPop");
  const chk = document.getElementById("termsAgree");
  const accept = document.getElementById("termsAcceptBtn");
  const readLink = document.getElementById("termsReadLink");
  if (!pop || !chk || !accept) return;
  let agreed = false;
  try { agreed = localStorage.getItem(KEY) === "1"; } catch (_e) { /* noop */ }
  if (agreed) return;

  // show immediately on entry and lock page scroll behind it
  pop.classList.add("show");
  pop.setAttribute("aria-hidden", "false");
  document.body.style.overflow = "hidden";

  function hide() {
    pop.classList.remove("show");
    pop.setAttribute("aria-hidden", "true");
    document.body.style.overflow = "";
  }

  chk.addEventListener("change", () => { accept.disabled = !chk.checked; });
  accept.addEventListener("click", () => {
    if (!chk.checked) return;
    try { localStorage.setItem(KEY, "1"); } catch (_e) { /* noop */ }
    hide();
  });
  if (readLink) {
    readLink.addEventListener("click", (event) => {
      event.preventDefault();
      const tos = document.querySelector(".legal-block");
      if (tos) {
        tos.setAttribute("open", "");
        // temporarily lift the popup so the user can read, then it stays until they accept
        pop.style.display = "none";
        document.body.style.overflow = "";
        tos.scrollIntoView({ behavior: "smooth", block: "center" });
        setTimeout(() => { if (localStorage.getItem(KEY) !== "1") { pop.style.display = ""; document.body.style.overflow = "hidden"; } }, 4000);
      }
    });
  }
}

// all teams per color, complete AND incomplete (greedy: best team, lock its orcs, repeat)
function buildAllTeams(items){
  const out=[];
  for(const [tone,group] of groupByTone(items)){
    const used=new Set();
    let guard=0;
    while(guard++<12){
      const rem=group.filter(it=>!used.has(it.address));
      if(!rem.length) break;
      const r=lightBestTeam(rem,CFG);
      const filled=r.team.filter(Boolean);
      if(!filled.length) break;
      out.push({team:r.team,result:r.result,tone,score:r.result.totalScore});
      filled.forEach(o=>used.add(o.address));
    }
  }
  return out.sort((a,b)=>b.score-a.score);
}

function teamHTML(t,idx){
  const sig=computeTeamSignals(t.team);
  const cov=t.result.coverage;
  const full=cov===EMOTIONS.length;
  const tone=cap1(t.tone||"—");
  const chips=[];
  t.result.synergyDetails.filter(d=>!d.trait.startsWith("Full team:")).slice(0,3).forEach(d=>{
    const lbl=d.trait.replace(/^Earrings?:/,"Серьги:").replace(/^Logo:/,"Лого:").replace(/^Bracelet:/,"Браслет:");
    chips.push('<span class="chip">'+escapeHtml(lbl)+' ×'+d.count+' +'+formatNumber(d.bonus)+'</span>');
  });
  const cells=EMOTIONS.map((emo,i)=>{
    const o=t.team[i];
    if(!o) return '<div class="cell empty"><div style="aspect-ratio:1;display:flex;align-items:center;justify-content:center;color:#333;font-size:18px;">—</div><div class="em">'+esc(emo)+'</div><div class="pw">·</div></div>';
    return '<div class="cell" onclick="openOrc(\''+o.address+'\')"><img src="'+esc(o.image)+'" loading="lazy" onerror="this.src=\'c-logo-nobg.png\'"><div class="em">'+esc(emo)+'</div><div class="pw">'+formatNumber(o.power)+'</div></div>';
  }).join("");
  return '<div class="team'+(full?'':' partial')+'">'+
    '<div class="team-top"><div class="team-name">'+esc(tone)+'<span class="cov">'+cov+'/7'+(full?'':' · incomplete')+'</span></div><div class="team-pwr">'+formatNumber(t.score)+' PWR</div></div>'+
    (chips.length?'<div class="chips">'+chips.join("")+'</div>':'')+
    '<div class="row">'+cells+'</div></div>';
}
function esc(s){return escapeHtml(s);}

let _idmap={};
let _teamOf={};
function render(orcs){
  ORCS=orcs; _idmap={}; orcs.forEach(o=>_idmap[o.address]=o);
  const teams=buildAllTeams(orcs);
  // remember each orc's team + its real synergy signals (to judge ACTIVE vs not in the modal)
  _teamOf={};
  teams.forEach(t=>{ const sig=computeTeamSignals(t.team); t.team.filter(Boolean).forEach(o=>{ _teamOf[o.address]={signals:sig}; }); });
  const tones=new Set(orcs.map(orcTone).filter(Boolean));
  document.getElementById("kOrcs").textContent=formatNumber(orcs.length);
  document.getElementById("kFull").textContent=teams.filter(t=>t.result.coverage===EMOTIONS.length).length;
  document.getElementById("kTones").textContent=tones.size;
  document.getElementById("kpis").style.display="grid";
  document.getElementById("teams").innerHTML = teams.length? teams.map((t,i)=>teamHTML(t,i)).join("") : '<div class="empty">No orcs found.</div>';
}

function openOrc(addr){
  const o=_idmap[addr]; if(!o) return;
  const rows=[];
  o.attributeBreakdown.forEach(a=>{
    rows.push('<div class="brk"><span class="v">'+esc(a.trait_type)+': '+esc(a.value)+'</span><span class="p'+(a.power?'':' zero')+'">'+(a.power?'+'+formatNumber(a.power):'0')+'</span></div>');
  });
  if(o.numberPower>0) rows.push('<div class="brk"><span class="v">Number #'+esc(o.number)+' (special)</span><span class="p">+'+formatNumber(o.numberPower)+'</span></div>');
  if(o.localComboBonus>0) rows.push('<div class="brk"><span class="v">Combo: shared words'+(o.localComboLabels&&o.localComboLabels.length?' ('+esc(o.localComboLabels.join(" / "))+')':'')+'</span><span class="p">+'+formatNumber(o.localComboBonus)+'</span></div>');
  rows.push('<div class="brk total"><span>Total orc power</span><span class="p">'+formatNumber(o.power)+'</span></div>');

  const sig = (_teamOf[o.address]||{}).signals || {earrings:new Map(),bracelets:new Map(),logos:new Map()};
  const ear=getAttributeValue(o,"Earrings"), br=getAttributeValue(o,"Bracelet");
  const active=[], idle=[];
  if(ear){ if(sig.earrings.has(norm(ear))){const d=sig.earrings.get(norm(ear)); active.push('серьги <b>'+esc(ear)+'</b> ×'+d.count+' (+'+formatNumber(d.bonus)+')');} else idle.push('серьги <b>'+esc(ear)+'</b>'); }
  if(br){ if(sig.bracelets.has(norm(br))){const d=sig.bracelets.get(norm(br)); active.push('браслет <b>'+esc(br)+'</b> ×'+d.count+' (+'+formatNumber(d.bonus)+')');} else idle.push('браслет <b>'+esc(br)+'</b>'); }
  for(const m of o.logoMatches){ const lbl=formatTokenLabel(m.token); if(sig.logos.has(m.token)){const d=sig.logos.get(m.token); active.push('лого <b>'+esc(lbl)+'</b> ×'+d.count+' (+'+formatNumber(d.bonus)+')');} else idle.push('лого <b>'+esc(lbl)+'</b>'); }
  let synNote="";
  if(active.length) synNote += '✅ Gives an ACTIVE team synergy: '+active.join(", ")+'.';
  if(idle.length) synNote += (synNote?'<br><br>':'')+'⚠️ Has the attribute, but the synergy is NOT active — no 4+ matching in this team: '+idle.join(", ")+'.';
  if(!active.length && !idle.length) synNote = 'This orc has no team-synergy attributes.';
  synNote += '<br><br>A team bonus applies when a single team has <b>4+</b> orcs with the same earrings / bracelet / logo (×4 +400, ×5 +500, ×6 +700, ×7 +1000). A full 7-orc one-colour team also gives +350.';

  document.getElementById("sheet").innerHTML =
    '<button class="x" onclick="closeOrc()">×</button>'+
    '<div class="sheet-hero"><img src="'+esc(o.image)+'" onerror="this.src=\'c-logo-nobg.png\'"><div>'+
      '<div class="nm">'+esc(o.name)+'</div><div class="sub">'+esc(cap1(orcTone(o)||"—"))+' · '+esc(o.emotion)+'</div>'+
      '<div class="big">'+formatNumber(o.power)+' PWR</div></div></div>'+
    '<div class="sec-t">Power breakdown</div>'+rows.join("")+
    '<div class="sec-t">Synergies</div><div class="note">'+synNote+'</div>'+
    '<div class="note" style="margin-top:8px;">Orc power = sum of attribute power + special sticker number + local combo (shared words between attributes). Team synergies are added to the <b>team</b>, not to a single orc.</div>';
  document.getElementById("modal").classList.add("show");
}
