<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Unstoppable Tribe — Teams</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{--bg:#0f0f0f;--bg2:#141414;--bg3:#1a1a1a;--bg4:#111;--g3:#919191;--g4:#9b9b9b;--text:#e8e8e8;--dim:#6a6a6a;--bd:rgba(145,145,145,.12);--bd2:rgba(145,145,145,.22);--gold:#c9a870;--green:#4db87a;--red:#c26262;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);padding:12px 12px 40px;font-size:14px;}
.head{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.head img{height:26px;}
.head .t{font-size:13px;font-weight:900;letter-spacing:3px;}
.bar{display:flex;gap:8px;margin-bottom:6px;}
.bar input{flex:1;min-width:0;background:var(--bg4);border:1px solid var(--bd2);border-radius:10px;padding:12px;color:var(--text);font-size:14px;outline:none;}
.bar input:focus{border-color:var(--g3);}
.bar button{background:linear-gradient(135deg,var(--g3),var(--g4));border:none;border-radius:10px;color:#fff;font-weight:800;padding:0 16px;font-size:13px;}
.bar button:disabled{opacity:.5;}
.hint{font-size:11px;color:var(--dim);margin-bottom:14px;}
.status{font-size:12px;color:var(--g4);margin:8px 0 14px;min-height:16px;}
.status.err{color:var(--red);} .status.ok{color:var(--green);}
.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
.kpi{background:var(--bg3);border:1px solid var(--bd);border-radius:12px;padding:10px;text-align:center;}
.kpi .n{font-size:18px;font-weight:900;color:#fff;}
.kpi .k{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--dim);margin-top:3px;}
.team{background:var(--bg3);border:1px solid var(--bd);border-radius:14px;padding:12px;margin-bottom:12px;}
.team.partial{border-color:rgba(194,98,98,.3);}
.team-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.team-name{font-size:14px;font-weight:900;}
.team-name .cov{font-size:11px;color:var(--dim);font-weight:700;margin-left:6px;}
.team-pwr{font-size:13px;font-weight:900;color:var(--gold);}
.chips{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;}
.chip{font-size:10px;font-weight:800;padding:3px 8px;border-radius:999px;background:rgba(77,184,122,.12);border:1px solid rgba(77,184,122,.28);color:#c7ecd6;}
.row{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
@media(max-width:430px){.row{grid-template-columns:repeat(4,1fr);}}
.cell{background:var(--bg4);border:1px solid var(--bd2);border-radius:9px;padding:5px 3px;text-align:center;cursor:pointer;}
.cell.empty{opacity:.35;}
.cell img{width:100%;aspect-ratio:1;object-fit:contain;border-radius:6px;}
.cell .em{font-size:8px;color:var(--dim);margin-top:3px;text-transform:uppercase;line-height:1.1;}
.cell .pw{font-size:11px;font-weight:900;color:#efe2bf;}
.modal{position:fixed;inset:0;background:rgba(5,5,5,.86);backdrop-filter:blur(6px);display:none;align-items:flex-end;justify-content:center;z-index:100;}
.modal.show{display:flex;}
.sheet{width:100%;max-width:520px;background:var(--bg2);border:1px solid var(--bd2);border-radius:18px 18px 0 0;padding:18px 16px 28px;max-height:88vh;overflow-y:auto;}
.sheet .x{float:right;font-size:22px;color:var(--dim);background:none;border:none;}
.sheet-hero{display:flex;gap:12px;align-items:center;margin-bottom:14px;}
.sheet-hero img{width:74px;height:74px;border-radius:12px;object-fit:contain;background:var(--bg4);border:1px solid var(--bd2);}
.sheet-hero .nm{font-size:16px;font-weight:900;}
.sheet-hero .sub{font-size:12px;color:var(--g4);margin-top:2px;}
.sheet-hero .big{font-size:24px;font-weight:900;color:var(--gold);margin-top:4px;}
.sec-t{font-size:10px;font-weight:800;letter-spacing:1.4px;text-transform:uppercase;color:var(--g3);margin:16px 0 8px;}
.brk{display:flex;justify-content:space-between;gap:10px;padding:8px 0;border-bottom:1px solid var(--bd);font-size:13px;}
.brk:last-child{border-bottom:none;}
.brk .v{color:#cdcdcd;} .brk .p{font-weight:900;color:#efe2bf;white-space:nowrap;}
.brk .p.zero{color:var(--dim);}
.brk.total{font-weight:900;font-size:15px;color:#fff;border-top:1px solid var(--bd2);margin-top:4px;padding-top:10px;}
.note{font-size:12px;line-height:1.6;color:#a9a9a9;background:var(--bg3);border:1px solid var(--bd);border-radius:10px;padding:10px 12px;margin-top:8px;}
.note b{color:#cfcfcf;}
.empty{padding:40px 16px;text-align:center;color:var(--dim);}
.foot{margin-top:22px;font-size:10px;color:#444;text-align:center;line-height:1.6;}
</style>

const STICKER_NUMBER_POWER = {
  0: 1000, 1: 1000, 2: 1000, 3: 1000, 4: 1000, 5: 1000, 6: 1000, 7: 1000, 8: 1000, 9: 1000,
  11: 500, 22: 500, 33: 500, 44: 500, 55: 500, 66: 500, 77: 500, 88: 500, 99: 500,
  111: 500, 222: 500, 333: 500, 444: 500, 555: 500, 666: 500, 777: 500, 888: 500, 999: 500,
  1111: 500, 2222: 500, 3333: 500, 4444: 500, 5555: 500, 6666: 500, 7777: 500, 8888: 500, 9999: 500,
  11111: 5000
};
// Local attribute synergy inside one orc:
// - Skin Tone never counts
// - 2 matched attributes => +100
// - 3 or more matched attributes => +300
// - at least one normalized word/root must match between attribute values
// - special cases from the rule sheet include Wallpaper -> Paper
// - Fake Gold must never match Gold
const ITEM_COMBO_BONUS = { 2: 100, 3: 300 };
const EARRING_TEAM_BONUS = { 4: 400, 5: 500, 6: 700, 7: 1000 };
const BRACELET_TEAM_BONUS = { 4: 400 };
const LOGO_TEAM_BONUS = { 4: 400, 5: 500, 6: 700, 7: 1000 };
const FULL_TEAM_BONUS_PER_ORC = 50;
const REQUEST_TIMEOUT_MS = 20000;
const WALLET_COLLECTION_NAME = "Unstoppable Tribe from ZarGates";
const TEAM_LOGO_KEYS = new Set([
  "zargates", "bitcoin", "telegram", "ton", "tribo games", "dollar", "eth", "rub", "elephant"
]);
const state = {
  items: [],
  filtered: [],
  topTeams: [],
  sortMode: "strongest",
  lastRun: null,
  isRunning: false,
  activeMode: "analyzer",
  walletRunning: false,
  walletItems: [],
  walletMarketItems: [],
  walletCurrentTeam: null,
  walletPlan: null
};

const scratchValues = [12, 47, 83, 156, 204, 310, 28, 91, 375, 512, 64, 138];
function scratch() {
  const value = scratchValues[Math.floor(Math.random() * scratchValues.length)];
  const number = document.getElementById("scv");
  const sub = document.getElementById("scs");
  if (number) {
    number.textContent = `${value} ★`;
  }
  if (sub) {
    sub.textContent = "Telegram Stars";
  }
}

function submitForm(event) {
  event.preventDefault();
  const input = document.getElementById("sub-input");
  const value = String(input?.value || "").trim();
  if (!value) {
    return;
  }
  const button = event.target?.querySelector("button");
  if (!button) {
    return;
  }
  button.textContent = "Saved";
  button.style.background = "#4db87a";
  if (input) {
    input.value = "";
  }
  window.setTimeout(() => {
    button.textContent = "Get Alerts";
    button.style.background = "";
  }, 3000);
}

function faq(element) {
  const item = element?.parentElement;
  if (!item) {
    return;
  }
  const isOpen = item.classList.contains("open");
  document.querySelectorAll(".fq.open").forEach((node) => node.classList.remove("open"));
  if (!isOpen) {
    item.classList.add("open");
  }
}

function norm(value) {
  return String(value || "")
    .trim()
    .toLowerCase()
    .replace(/[’']/g, "'")
    .replace(/\s+/g, " ");
}

function escapeHtml(value) {
  return String(value ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function formatNumber(value) {
  return new Intl.NumberFormat("en-US").format(Number(value || 0));
}

function sleep(ms) {
  return new Promise((resolve) => setTimeout(resolve, ms));
}

function canonicalTraitType(traitType) {
  const text = norm(traitType);
  if (text === "earring" || text === "earrings") {
    return "Earrings";
  }
  if (text === "bracelets") {
    return "Bracelet";
  }
  return String(traitType || "").trim();
}

function createNetworkErrorMessage(error, url) {
  const host = (() => {
    try {
      return new URL(url).hostname;
    } catch (_error) {
      return "remote host";
    }
  })();
  const browserOffline = typeof navigator !== "undefined" && navigator.onLine === false;
  if (browserOffline) {
    return "No internet connection detected in the browser.";
  }
  if (error?.name === "AbortError") {
    return `Request to ${host} timed out. This can happen when TonAPI is slow or when your network works better with VPN.`;
  }
  return `Could not reach ${host}. This may be a temporary network issue, a blocked request, or a region/VPN problem.`;
}

function createParticles() {
  const root = document.getElementById("pts");
  for (let i = 0; i < 44; i += 1) {
    const el = document.createElement("div");
    el.className = "pt";
    const size = Math.random() * 4 + 1;
    el.style.width = size + "px";
    el.style.height = size + "px";
    el.style.left = Math.random() * 100 + "%";
    el.style.bottom = "-10px";
    el.style.background = `rgba(145,145,145,${Math.random() * 0.45 + 0.08})`;
    el.style.animationDuration = Math.random() * 12 + 12 + "s";
    el.style.animationDelay = Math.random() * 10 + "s";
    root.appendChild(el);
  }
}

function clamp(value, min, max) {
  return Math.min(max, Math.max(min, value));
}

function setStatusFor(statusId, message, kind = "", progress = null) {
  const status = document.getElementById(statusId);
  if (!status) {
    return;
  }
  const text = status.querySelector(".status-text");
  const fill = status.querySelector(".status-fill");
  const flag = status.querySelector(".status-flag");
  const requestedProgress = progress === null ? (kind === "ok" || kind === "err" ? 100 : 0) : clamp(Number(progress) || 0, 0, 100);
  const previousProgress = Number(status.dataset.progress || 0);
  const safeProgress = requestedProgress <= 0
    ? 0
    : Math.max(previousProgress, requestedProgress);
  status.className = "status" + (kind ? " " + kind : "");
  status.dataset.progress = String(safeProgress);
  if (text) {
    text.textContent = message;
  }
  if (fill) {
    fill.style.width = `${safeProgress}%`;
  }
  if (flag) {
    flag.style.left = `${safeProgress}%`;
    flag.style.opacity = safeProgress <= 0 ? "0" : "1";
  }
}

function setStatus(message, kind = "", progress = null) {
  setStatusFor("loadStatus", message, kind, progress);
}

function setWalletStatus(message, kind = "", progress = null) {
  setStatusFor("walletStatus", message, kind, progress);
}

function setClanStatus(message, kind = "", progress = null) {
  setStatusFor("clanStatus", message, kind, progress);
}

function setClanActionStatus(message, kind = "", progress = null) {
  setStatusFor("clanActionStatus", message, kind, progress);
}

function resetStatusProgress(statusId = "loadStatus") {
  const status = document.getElementById(statusId);
  if (status) {
    status.dataset.progress = "0";
  }
}

function getElementValue(id, fallback = "") {
  const element = document.getElementById(id);
  if (!element) {
    return fallback;
  }
  return element.value;
}

function getConfig() {
  return {
    collectionInput: String(getElementValue("collectionInput", "https://getgems.io/unstoppabletribe?filter=%7B%22attributes%22%3A%7B%22Skin+Tone%22%3A%5B%22Cavern%22%5D%7D%7D")).trim(),
    traitType: String(getElementValue("traitTypeInput", "Skin Tone")).trim(),
    traitValue: String(getElementValue("traitValueInput", "Cavern")).trim(),
    searchWidth: Math.max(50, Math.min(500, Number(getElementValue("candidateCapInput", 180) || 180))),
    pageLimit: Math.max(25, Math.min(200, Number(getElementValue("pageLimitInput", 200) || 200))),
    fallbackPower: Math.max(0, Number(getElementValue("fallbackPowerInput", 0) || 0)),
    sameTribeBonus: FULL_TEAM_BONUS_PER_ORC,
    focusBonus: Math.max(0, Number(getElementValue("focusBonusInput", 0) || 0))
  };
}

async function parseCollectionAddress(rawInput) {
  const raw = rawInput.trim();
  if (!raw) {
    throw new Error("A collection address or Getgems URL is required.");
  }

  if (/^(EQ|UQ|kQ|0:)[A-Za-z0-9_-]+$/.test(raw)) {
    return raw;
  }

  try {
    const url = new URL(raw);
    const parts = url.pathname.split("/").filter(Boolean);
    const collectionIndex = parts.indexOf("collection");
    if (collectionIndex !== -1 && parts[collectionIndex + 1]) {
      return decodeURIComponent(parts[collectionIndex + 1]);
    }

    if (/getgems\.io$/i.test(url.hostname)) {
      const slug = parts[0] ? decodeURIComponent(parts[0]).toLowerCase() : "";
      if (slug && KNOWN_GETGEMS_COLLECTIONS[slug]) {
        return KNOWN_GETGEMS_COLLECTIONS[slug];
      }
    }
  } catch (error) {
    /* noop */
  }

  throw new Error("Could not parse the collection address. Supported inputs right now: EQ..., a Getgems collection URL, and the `unstoppabletribe` slug.");
}

function getImage(item) {
  const previews = Array.isArray(item.previews) ? item.previews : [];
  const preferred = previews.find((preview) => preview.resolution === "500x500")
    || previews.find((preview) => preview.resolution === "100x100")
    || previews[0];
  return preferred?.url || item.metadata?.image || "c-logo-nobg.png";
}

function extractEmotion(name) {
  const lower = norm(name);
  return EMOTIONS.find((emotion) => lower.includes(norm(emotion))) || "Unknown";
}

function extractNumber(name) {
  const match = String(name || "").match(/#(\d+)/);
  return match ? Number(match[1]) : null;
}

function getAttributePower(traitType, value, fallbackPower) {
  const table = ATTRIBUTE_POWER_TABLES[norm(traitType)];
  const exact = table ? table[norm(value)] : undefined;
  return exact ?? fallbackPower;
}

function getStickerNumberPower(number) {
  if (number === null || number === undefined) {
    return 0;
  }
  return STICKER_NUMBER_POWER[number] || 0;
}

function getValueTokens(value) {
  const text = norm(value);
  const tokens = new Set();

  // Fake Gold is explicitly excluded from Gold synergy.
  if (!text.includes("fake gold") && /\bgold(?:en)?\b/.test(text)) tokens.add("gold");
  if (/\bsilver\b/.test(text)) tokens.add("silver");
  if (/\bspiked?\b/.test(text)) tokens.add("spiked");
  if (/\brope\b/.test(text)) tokens.add("rope");
  if (/\bmechanic(?:al)?\b/.test(text) || /\bmechanic's\b/.test(text)) tokens.add("mechanical");
  if (/\bmagic\b/.test(text) || /\bmagical\b/.test(text)) tokens.add("magic");
  if (/\bmushroom(?:s)?\b/.test(text) || /\btoadstool(?:s)?\b/.test(text) || text.includes("fly agaric")) tokens.add("mushroom");
  // Rule-sheet special cases: Vintage Wallpaper + Paper and Grandma's Wallpaper + Paper.
  if (/\bpaper\b/.test(text) || /\bwallpaper\b/.test(text)) tokens.add("paper");

  [
    "zargates", "telegram", "bitcoin", "tribo games", "lunar", "demonic", "cosmic", "phoenix",
    "fairytale", "martian", "desert", "cavern", "sea", "forest", "mountain", "tropical",
    "elephant", "ruby", "diamond", "emerald", "cyber", "magical", "dollar", "eth", "rub"
  ].forEach((token) => {
    if (new RegExp("\\b" + token + "\\b").test(text)) { // whole-word match (no "teeth"->"eth" false hits)
      tokens.add(token);
    }
  });

  if (text.includes("professor ton") || /\bton\b/.test(text)) tokens.add("ton");
  return tokens;
}

function getLogoKey(value) {
  const text = norm(value);
  if (text === "zargates" || text === "zargates business") return "zargates";
  if (text === "bitcoin") return "bitcoin";
  if (text === "telegram") return "telegram";
  if (text === "ton" || text === "professor ton") return "ton";
  if (text === "tribo games") return "tribo games";
  if (text === "dollar") return "dollar";
  if (text === "eth") return "eth";
  if (text === "rub") return "rub";
  if (text === "elephant") return "elephant";
  return null;
}

function getLogoMatches(attributes) {
  const logos = [];
  for (const attr of attributes) {
    if (norm(attr.trait_type) === "skin tone") {
      continue;
    }
    const logoKey = getLogoKey(attr.value);
    if (logoKey && TEAM_LOGO_KEYS.has(logoKey)) {
      logos.push({
        token: logoKey,
        traitType: attr.trait_type,
        value: attr.value
      });
    }
  }
  return logos;
}

// Local combo (official rule): two attributes combo if a WORD from one appears in the
// other's name. Substring allowed only for words >=4 chars, so short ones (ETH/RUB/TON)
// don't false-match (e.g. eth in teeth). Fake Gold never links via "gold"; Wallpaper~Paper;
// Skin Tone ignored.  2 attrs => +100, 3+ => +300.
function attrWords(value) {
  const t = norm(value);
  const words = new Set(t.split(/[^a-z0-9]+/).filter((w) => w.length >= 2)); // drop 1-char artefacts like possessive "s"
  if (t.includes("fake gold")) words.delete("gold");
  if (t.includes("wallpaper")) words.add("paper");
  return [...words];
}
function wordsLink(a, b) {
  for (const x of a) for (const y of b) {
    if (x === y) return x;
    if (x.length >= 4 && y.includes(x)) return x;
    if (y.length >= 4 && x.includes(y)) return y;
  }
  return null;
}
function buildLocalAttributeCombo(attributes) {
  const relevant = attributes
    .filter((attr) => norm(attr.trait_type) !== "skin tone")
    .map((attr) => ({ label: `${attr.trait_type}: ${attr.value}`, words: attrWords(attr.value) }))
    .filter((attr) => attr.words.length);

  let bestLabels = [];
  let bestTokens = [];
  let bestSize = 1;

  for (let i = 0; i < relevant.length; i += 1) {
    const seen = new Set([i]);
    const queue = [i];
    const shared = new Set();
    while (queue.length) {
      const current = queue.shift();
      for (let j = 0; j < relevant.length; j += 1) {
        if (seen.has(j)) continue;
        const w = wordsLink(relevant[current].words, relevant[j].words);
        if (w) { seen.add(j); queue.push(j); shared.add(w); }
      }
    }
    if (seen.size > bestSize) {
      bestSize = seen.size;
      bestLabels = [...seen].map((index) => relevant[index].label);
      bestTokens = [...shared];
    }
  }

  const effectiveSize = bestSize >= 3 ? 3 : bestSize;
  return { size: bestSize, bonus: ITEM_COMBO_BONUS[effectiveSize] || 0, labels: bestLabels, tokens: bestTokens };
}

function getLocalComboSummary(item) {
  if (!item.localComboBonus) {
    return null;
  }
  const tokenLabel = item.localComboTokens && item.localComboTokens.length
    ? item.localComboTokens.map((token) => formatTokenLabel(token)).join(", ")
    : "Shared words";
  const sourceLabel = item.localComboLabels && item.localComboLabels.length
    ? item.localComboLabels.join(" / ")
    : "";
  return {
    tokenLabel,
    sourceLabel
  };
}

function getItemModalSections(item, signals) {
  const attributeRows = item.attributeBreakdown.map((attr) => ({
    title: `${attr.trait_type}`,
    subtitle: attr.value,
    bonus: attr.power
  }));
  const internalRows = [];
  const teamRows = [];
  const combo = getLocalComboSummary(item);
  const earring = getAttributeValue(item, "Earrings");
  const bracelet = getAttributeValue(item, "Bracelet");

  if (combo) {
    internalRows.push({
      title: `Attributes Synergy: ${combo.tokenLabel}`,
      subtitle: combo.sourceLabel || "Matched words between this orc's attributes.",
      bonus: item.localComboBonus
    });
  }
  if (item.numberPower > 0) {
    internalRows.push({
      title: `Number Power`,
      subtitle: `Sticker #${item.number ?? "?"}`,
      bonus: item.numberPower
    });
  }
  if (earring) {
    const earringSync = signals.earrings.get(norm(earring));
    if (earringSync) {
      teamRows.push({
        title: `Team Earring`,
        subtitle: `${earringSync.value} x${earringSync.count}`,
        bonus: earringSync.bonus
      });
    }
  }
  if (bracelet) {
    const braceletSync = signals.bracelets.get(norm(bracelet));
    if (braceletSync) {
      teamRows.push({
        title: `Team Bracelet`,
        subtitle: `${braceletSync.value} x${braceletSync.count}`,
        bonus: braceletSync.bonus
      });
    }
  }
  const logoGroups = new Map();
  for (const match of item.logoMatches) {
    const logoSync = signals.logos.get(match.token);
    if (!logoSync) {
      continue;
    }
    const current = logoGroups.get(match.token) || { sync: logoSync, attrs: [] };
    current.attrs.push(`${match.traitType}: ${match.value}`);
    logoGroups.set(match.token, current);
  }
  for (const { sync, attrs } of logoGroups.values()) {
    teamRows.push({
      title: `Team Logo`,
      subtitle: `${formatTokenLabel(sync.token)} x${sync.count} · ${attrs.join(" / ")}`,
      bonus: sync.bonus
    });
  }

  return {
    attributeRows,
    internalRows,
    teamRows
  };
}

function getTierBonus(count, table) {
  return Object.keys(table)
    .map(Number)
    .sort((a, b) => a - b)
    .reduce((bonus, threshold) => (count >= threshold ? table[threshold] : bonus), 0);
}

function formatTokenLabel(token) {
  if (token === "tribo games") {
    return "Tribo Games";
  }
  if (token === "eth") {
    return "ETH";
  }
  if (token === "rub") {
    return "RUB";
  }
  if (token === "ton") {
    return "TON";
  }
  if (token === "zargates") {
    return "ZarGates";
  }
  if (token === "tribo games") {
    return "Tribo Games";
  }
  return token.split(" ").map((part) => part.charAt(0).toUpperCase() + part.slice(1)).join(" ");
}

function getRangedProgress(current, total, start, end) {
  if (!total || total <= 0) {
    return start;
  }
  return clamp(start + (current / total) * (end - start), start, end);
}

function getAdaptivePageProgress(page, start, end) {
  const safePage = Math.max(0, Number(page) || 0);
  const span = Math.max(0, end - start);
  const eased = 1 - Math.exp(-safePage / 4.5);
  return clamp(start + eased * span, start, end);
}

function getFetchProgress(checkedCount, totalCount) {
  return getRangedProgress(checkedCount, totalCount, 0, 72);
}

function getBuildProgress(step, total) {
  return getRangedProgress(step, total, 76, 98);
}

function getWalletOwnedFetchProgress(page) {
  return getAdaptivePageProgress(page, 0, 22);
}

function getWalletOwnedBuildProgress(step, total) {
  return getRangedProgress(step, total, 24, 46);
}

function getWalletMarketFetchProgress(checkedCount, totalCount) {
  return getRangedProgress(checkedCount, totalCount, 48, 78);
}

function getWalletPlanBuildProgress(step, total) {
  return getRangedProgress(step, total, 80, 98);
}

function resetInitialViewport() {
  if ("scrollRestoration" in history) {
    history.scrollRestoration = "manual";

  if (window.location.hash) {

  }

}

function rawItemMatchesFocus(rawItem, config) {
  const attributes = Array.isArray(rawItem?.metadata?.attributes) ? rawItem.metadata.attributes : [];
  const targetTrait = norm(config.traitType);
  const targetValue = norm(config.traitValue);
  return attributes.some((attr) =>
    attr
    && attr.trait_type !== undefined
    && attr.value !== undefined
    && norm(attr.trait_type) === targetTrait
    && norm(attr.value) === targetValue
  );
}

function getAttributeValue(item, traitType) {
  return item.attributes.find((entry) => norm(entry.trait_type) === norm(traitType))?.value || null;
}

function computeTeamSignals(team) {
  const realTeam = team.filter(Boolean);
  const active = {
    fullCavern: realTeam.length === EMOTIONS.length && realTeam.every((item) => item.matchesFocus),
    earrings: new Map(),
    bracelets: new Map(),
    logos: new Map()
  };
  const earringCounts = new Map();
  const braceletCounts = new Map();
  const logoCounts = new Map();

  for (const item of realTeam) {
    const earring = getAttributeValue(item, "Earrings");
    const bracelet = getAttributeValue(item, "Bracelet");
    if (earring) {
      const key = norm(earring);
      earringCounts.set(key, { count: (earringCounts.get(key)?.count || 0) + 1, value: earring });
    }
    if (bracelet) {
      const key = norm(bracelet);
      braceletCounts.set(key, { count: (braceletCounts.get(key)?.count || 0) + 1, value: bracelet });
    }
    for (const match of item.logoMatches) {
      const current = logoCounts.get(match.token) || { count: 0, attrs: [] };
      current.count += 1;
      current.attrs.push(`${match.traitType}: ${match.value}`);
      logoCounts.set(match.token, current);
    }
  }

  for (const [key, data] of earringCounts.entries()) {
    const bonus = getTierBonus(data.count, EARRING_TEAM_BONUS);
    if (bonus > 0) {
      active.earrings.set(key, { value: data.value, count: data.count, bonus });
    }
  }
  for (const [key, data] of braceletCounts.entries()) {
    const bonus = getTierBonus(data.count, BRACELET_TEAM_BONUS);
    if (bonus > 0) {
      active.bracelets.set(key, { value: data.value, count: data.count, bonus });
    }
  }
  for (const [token, data] of logoCounts.entries()) {
    const bonus = getTierBonus(data.count, LOGO_TEAM_BONUS);
    if (bonus > 0) {
      active.logos.set(token, { token, count: data.count, bonus, attrs: data.attrs });
    }
  }

  return active;
}

function getItemTeamBadges(item, signals) {
  const badges = [];
  const earring = getAttributeValue(item, "Earrings");
  const bracelet = getAttributeValue(item, "Bracelet");

  if (item.numberPower > 0) {
    badges.push({ label: "Number", kind: "number" });

  if (item.localComboBonus > 0) {
    badges.push({ label: "Combo", kind: "combo" });
  }
  if (earring && signals.earrings.has(norm(earring))) {
    badges.push({ label: "Earring", kind: "earring" });
  }
  if (bracelet && signals.bracelets.has(norm(bracelet))) {
    badges.push({ label: "Bracelet", kind: "bracelet" });
  }
  return badges.slice(0, 3);
}

function hasItemSynergyDetails(item, signals) {
  const earring = getAttributeValue(item, "Earrings");
  const bracelet = getAttributeValue(item, "Bracelet");
  return Boolean(
    item.localComboBonus > 0
    || (earring && signals.earrings.has(norm(earring)))
    || (bracelet && signals.bracelets.has(norm(bracelet)))
  );
}

function getItemSynergyBreakdown(item, signals) {
  const lines = [];
  const earring = getAttributeValue(item, "Earrings");
  const bracelet = getAttributeValue(item, "Bracelet");

  if (item.numberPower > 0) {
    lines.push(`Number Power: +${formatNumber(item.numberPower)}`);

  if (item.localComboBonus > 0) {
    const combo = getLocalComboSummary(item);
    lines.push(`Local Combo: ${combo.tokenLabel} +${formatNumber(item.localComboBonus)}`);
    if (combo.sourceLabel) {
      lines.push(`Combo Source: ${combo.sourceLabel}`);
    }
  }
  if (earring) {
    const earringSync = signals.earrings.get(norm(earring));
    if (earringSync) {
      lines.push(`Team Earring: ${earringSync.value} x${earringSync.count} +${formatNumber(earringSync.bonus)}`);
    }
  }
  if (bracelet) {
    const braceletSync = signals.bracelets.get(norm(bracelet));
    if (braceletSync) {
      lines.push(`Team Bracelet: ${braceletSync.value} x${braceletSync.count} +${formatNumber(braceletSync.bonus)}`);
    }

  return lines;
}

function getItemFeatureKeys(item) {
  const keys = [];
  const earring = getAttributeValue(item, "Earrings");
  const bracelet = getAttributeValue(item, "Bracelet");

  if (earring) {
    keys.push(`earring:${norm(earring)}`);
  }
  if (bracelet) {
    keys.push(`bracelet:${norm(bracelet)}`);
  }
  for (const token of new Set(item.logoMatches.map((match) => match.token))) {
    keys.push(`logo:${token}`);
  }
  if (item.numberPower > 0) {
    keys.push("special:number");
  }
  if (item.localComboBonus > 0) {
    keys.push("special:combo");
  }

  return keys;
}

function getTeamLeadLabel(entry) {
  const top = entry.result.synergyDetails[0]?.trait || "";
  if (top.startsWith("Logo: ")) {
    return top.replace("Logo: ", "");
  }
  if (top.startsWith("Earrings: ")) {
    return top.replace("Earrings: ", "");
  }
  if (top.startsWith("Bracelet: ")) {
    return top.replace("Bracelet: ", "");
  }
  if (top.startsWith("Full team: ")) {
    return top.replace("Full team: ", "");
  }
  return "Cavern";
}

function buildEmotionCandidatePool(items, searchWidth) {
  const sorted = [...items].sort((a, b) =>
    b.score - a.score
    || b.power - a.power
    || b.attributeBreakdown.length - a.attributeBreakdown.length
    || a.name.localeCompare(b.name, "ru")
  );
  const selected = new Map();
  const baseTake = Math.max(18, Math.min(sorted.length, Math.floor(searchWidth * 0.45)));
  sorted.slice(0, baseTake).forEach((item) => selected.set(item.address, item));

  const featureBuckets = new Map();
  for (const item of sorted) {
    for (const key of getItemFeatureKeys(item)) {
      const bucket = featureBuckets.get(key) || [];
      if (bucket.length < 4) {
        bucket.push(item);
        featureBuckets.set(key, bucket);
      }
    }
  }

  for (const bucket of featureBuckets.values()) {
    bucket.forEach((item) => selected.set(item.address, item));
  }

  return [...selected.values()]
    .sort((a, b) => b.score - a.score || b.power - a.power || a.name.localeCompare(b.name, "ru"))
    .slice(0, Math.max(searchWidth, 60));
}

function getRemainingMaxPower(groups, startIndex) {
  let total = 0;
  for (let index = startIndex; index < groups.length; index += 1) {
    total += groups[index].length ? groups[index][0].score : 0;
  }
  return total;
}

function getTeamIdentity(team) {
  return team.filter(Boolean).map((item) => item.address).join("|");
}

async function buildBeamBestTeam(items, config, onProgress) {
  const groups = EMOTIONS.map((emotion) =>
    buildEmotionCandidatePool(items.filter((item) => item.emotion === emotion), config.searchWidth)
  );
  const beamWidth = Math.max(120, Math.min(2000, config.searchWidth * 6));
  let beam = [{
    team: [],
    result: evaluateTeam([], config),
    optimistic: getRemainingMaxPower(groups, 0)
  }];

  for (let index = 0; index < groups.length; index += 1) {
    const candidates = groups[index];
    const next = [];
    const seen = new Map();

    if (!candidates.length) {
      beam = beam.map((entry) => {
        const team = [...entry.team, null];
        const result = evaluateTeam(team, config);
        return {
          team,
          result,
          optimistic: result.totalScore + getRemainingMaxPower(groups, index + 1)
        };
      });
      continue;
    }

    for (const entry of beam) {
      for (const item of candidates) {
        const team = [...entry.team, item];
        const result = evaluateTeam(team, config);
        const optimistic = result.totalScore + getRemainingMaxPower(groups, index + 1);
        const key = getTeamIdentity(team);
        const current = seen.get(key);
        if (!current || optimistic > current.optimistic || result.totalScore > current.result.totalScore) {
          seen.set(key, { team, result, optimistic });
        }
      }
    }

    beam = [...seen.values()]
      .sort((a, b) =>
        b.result.coverage - a.result.coverage
        || b.optimistic - a.optimistic
        || b.result.totalScore - a.result.totalScore
      )
      .slice(0, beamWidth);

    if (typeof onProgress === "function") {
      onProgress(`Building top teams: emotion ${index + 1}/7...`, { step: index + 1, total: groups.length, beamSize: beam.length });
    }
    await sleep(0);
  }

  return beam
    .filter((entry) => entry.result.coverage > 0)
    .sort((a, b) =>
      b.result.coverage - a.result.coverage
      || b.result.totalScore - a.result.totalScore
      || b.result.synergyScore - a.result.synergyScore
    )[0] || null;
}

async function buildTopTeams(items, config, onProgress) {
  // Ranking follows the saved rules every time:
  // item power already includes attributes, sticker numbers, and local word-based combos;
  // team score adds shared Earrings / Bracelet / Logo bonuses;
  // once an orc is locked into a higher-ranked team, it cannot be reused later.
  const rankedTeams = [];
  const usedAddresses = new Set();
  const maxTeams = 10;

  for (let teamIndex = 0; teamIndex < maxTeams; teamIndex += 1) {
    const remainingItems = items.filter((item) => !usedAddresses.has(item.address));
    if (!remainingItems.length) {
      break;
    }

    const bestEntry = await buildBeamBestTeam(remainingItems, config, (message, meta) => {
      if (typeof onProgress === "function") {
        onProgress(`Building unique teams: ${teamIndex + 1}/${maxTeams} · ${message}`, meta);
      }
    });

    if (!bestEntry || bestEntry.result.coverage === 0) {
      break;
    }

    rankedTeams.push(bestEntry);
    bestEntry.team.filter(Boolean).forEach((item) => usedAddresses.add(item.address));

    if (typeof onProgress === "function") {
      onProgress(
        `Locked unique team ${teamIndex + 1}/${maxTeams} · ${bestEntry.result.coverage} Orcs · ${formatNumber(bestEntry.result.totalScore)} PWR`,
        { step: teamIndex + 1, total: maxTeams, coverage: bestEntry.result.coverage }
      );
    }
    await sleep(0);
  }

  return rankedTeams;
}

function normalizeItem(rawItem, config) {
  const metadata = rawItem.metadata || {};
  const attributes = Array.isArray(metadata.attributes) ? metadata.attributes : [];
  const cleanAttributes = attributes
    .filter((attr) => attr && attr.trait_type && attr.value !== undefined && attr.value !== null)
    .map((attr) => ({
      trait_type: canonicalTraitType(attr.trait_type),
      value: String(attr.value).trim()
    }));

  const targetTrait = norm(config.traitType);
  const targetValue = norm(config.traitValue);

  const matchesFocus = cleanAttributes.some((attr) =>
    norm(attr.trait_type) === targetTrait && norm(attr.value) === targetValue
  );

  const name = metadata.name || `Orc #${rawItem.index ?? "?"}`;
  const number = extractNumber(name);
  const emotion = extractEmotion(name);
  const attributeBreakdown = cleanAttributes.map((attr) => ({
    trait_type: attr.trait_type,
    value: attr.value,
    power: getAttributePower(attr.trait_type, attr.value, config.fallbackPower)
  }));
  const attributePower = attributeBreakdown.reduce((sum, attr) => sum + attr.power, 0);
  const numberPower = getStickerNumberPower(number);
  const localCombo = buildLocalAttributeCombo(cleanAttributes);
  const power = attributePower + numberPower + localCombo.bonus;
  const score = power + (matchesFocus ? config.focusBonus : 0);
  const saleValueRaw = rawItem?.sale?.price?.value;
  const saleDecimals = Number(rawItem?.sale?.price?.decimals || 0);
  const salePriceValue = saleValueRaw ? Number(saleValueRaw) / Math.pow(10, saleDecimals) : 0;
  const synergyTraits = cleanAttributes
    .filter((attr) => norm(attr.trait_type) !== targetTrait)
    .map((attr) => `${attr.trait_type}: ${attr.value}`);

  return {
    address: rawItem.address,
    name,
    number,
    emotion,
    attributePower,
    numberPower,
    localComboBonus: localCombo.bonus,
    localComboLabels: localCombo.labels,
    localComboTokens: localCombo.tokens,
    power,
    score,
    matchesFocus,
    image: getImage(rawItem),
    attributes: cleanAttributes,
    attributeBreakdown,
    synergyTraits,
    synergyTraitSet: new Set(synergyTraits),
    logoMatches: getLogoMatches(cleanAttributes),
    market: metadata.marketplace || "getgems.io",
    saleAddress: rawItem?.sale?.address || null,
    saleMarket: rawItem?.sale?.market?.name || null,
    salePriceValue,
    saleOwner: rawItem?.sale?.owner?.address || null
  };
}

async function fetchJsonWithRetry(url, options = {}, context = {}) {
  const maxAttempts = context.maxAttempts || 6;

  for (let attempt = 1; attempt <= maxAttempts; attempt += 1) {
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), context.timeoutMs || REQUEST_TIMEOUT_MS);
    let response;
    try {
      response = await fetch(url, { ...options, signal: controller.signal });
    } catch (error) {
      clearTimeout(timeoutId);
      if (attempt === maxAttempts) {
        throw new Error(createNetworkErrorMessage(error, url));
      }
      const waitMs = Math.min(10000, 1200 * Math.pow(2, attempt - 1));
      if (typeof context.onRetry === "function") {
        context.onRetry(waitMs, attempt, createNetworkErrorMessage(error, url));
      }
      await sleep(waitMs);
      continue;
    }
    clearTimeout(timeoutId);
    if (response.ok) {
      return response.json();
    }

    if (response.status !== 429) {
      if (response.status === 401 || response.status === 403) {
        throw new Error(`TonAPI rejected the request with ${response.status}. This can happen because of region, firewall, VPN, or API protection.`);
      }
      if (response.status >= 500) {
        throw new Error(`TonAPI returned ${response.status}. The service may be temporarily unstable, so try again in a minute.`);
      }
      throw new Error(`TonAPI returned ${response.status}.`);
    }

    if (attempt === maxAttempts) {
      throw new Error("TonAPI kept returning 429 for too long. Please wait a bit and try again.");
    }

    const retryAfter = Number(response.headers.get("retry-after"));
    const waitMs = Number.isFinite(retryAfter) && retryAfter > 0
      ? retryAfter * 1000
      : Math.min(12000, 1200 * Math.pow(2, attempt - 1));

    if (typeof context.onRetry === "function") {
      context.onRetry(waitMs, attempt, null);
    }

    await sleep(waitMs);
  }

  throw new Error("Failed to get a response from TonAPI.");
}

async function fetchCollectionItems(address, pageLimit, config, onProgress) {
  const matchedItems = [];
  const seenAddresses = new Set();
  let matchedFocusCount = 0;
  let checkedCount = 0;
  let offset = 0;
  let page = 0;
  const maxPages = 1000;

  while (page < maxPages) {
    const url = `https://tonapi.io/v2/nfts/collections/${encodeURIComponent(address)}/items?limit=${pageLimit}&offset=${offset}`;
    const data = await fetchJsonWithRetry(
      url,
      { headers: { accept: "application/json" } },
      {
        maxAttempts: 6,
        onRetry(waitMs, attempt, retryReason) {
          onProgress(
            retryReason
              ? `${retryReason} Waiting ${Math.ceil(waitMs / 1000)}s and retrying (${attempt}/6)...`
              : `TonAPI 429 on page ${page + 1}. Waiting ${Math.ceil(waitMs / 1000)}s and retrying (${attempt}/6)...`,
            { checkedCount, matchedCount: matchedFocusCount, page: page + 1 }
          );
        }
      }
    );
    const batch = Array.isArray(data.nft_items) ? data.nft_items : [];
    let uniqueAdded = 0;
    for (const rawItem of batch) {
      const key = rawItem?.address || `${rawItem?.collection?.address || "collection"}:${rawItem?.index ?? checkedCount}`;
      if (seenAddresses.has(key)) {
        continue;
      }
      seenAddresses.add(key);
      checkedCount += 1;
      uniqueAdded += 1;
      if (rawItemMatchesFocus(rawItem, config)) {
        matchedFocusCount += 1;
        matchedItems.push(rawItem);
      }
    }

    onProgress(
      `Checked ${checkedCount} NFTs · found ${matchedFocusCount} Cavern · page ${page + 1}...`,
      { checkedCount, matchedCount: matchedFocusCount, page: page + 1 }
    );

    if (!batch.length || batch.length < pageLimit) {
      break;
    }

    offset += batch.length;
    page += 1;
    await sleep(250);
  }

  if (page >= maxPages) {
    throw new Error("The collection is too large for a single pass. Increase the page limit in code.");
  }

  return {
    checkedCount,
    matchedCount: matchedFocusCount,
    items: matchedItems
  };
}

async function fetchCollectionSize(address) {
  const url = `https://tonapi.io/v2/nfts/collections/${encodeURIComponent(address)}`;
  const data = await fetchJsonWithRetry(url, { headers: { accept: "application/json" } }, { maxAttempts: 4 });
  const nextItemIndex = Number(data?.next_item_index);
  return Number.isFinite(nextItemIndex) && nextItemIndex > 0 ? nextItemIndex : null;
}

function buildTraitFrequency(items) {
  const map = new Map();
  for (const item of items) {
    for (const trait of item.synergyTraits) {
      map.set(trait, (map.get(trait) || 0) + 1);
    }
  }
  return [...map.entries()]
    .sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0], "ru"))
    .slice(0, 16);
}

function buildEmotionCoverage(items) {
  return EMOTIONS.map((emotion) => ({
    emotion,
    count: items.filter((item) => item.emotion === emotion).length
  }));
}

function evaluateTeam(team, config) {
  const realTeam = team.filter(Boolean);
  let synergyScore = 0;
  const synergyDetails = [];

  [
    { traitType: "Earrings", table: EARRING_TEAM_BONUS, label: "Earrings" },
    { traitType: "Bracelet", table: BRACELET_TEAM_BONUS, label: "Bracelet" }
  ].forEach((rule) => {
    const counts = new Map();
    for (const item of realTeam) {
      const attr = item.attributes.find((entry) => norm(entry.trait_type) === norm(rule.traitType));
      if (!attr) {
        continue;
      }
      const key = norm(attr.value);
      counts.set(key, {
        value: attr.value,
        count: (counts.get(key)?.count || 0) + 1
      });
    }

    for (const { value, count } of counts.values()) {
      const bonus = getTierBonus(count, rule.table);
      if (!bonus) {
        continue;
      }
      synergyScore += bonus;
      synergyDetails.push({
        trait: `${rule.label}: ${value}`,
        count,
        bonus
      });
    }
  });

  const logoCounts = new Map();
  for (const item of realTeam) {
    for (const match of item.logoMatches) {
      logoCounts.set(match.token, (logoCounts.get(match.token) || 0) + 1);
    }
  }
  for (const [token, count] of logoCounts.entries()) {
    const bonus = getTierBonus(count, LOGO_TEAM_BONUS);
    if (!bonus) {
      continue;
    }
    synergyScore += bonus;
    synergyDetails.push({
      trait: `Logo: ${formatTokenLabel(token)}`,
      count,
      bonus
    });
  }

  if (realTeam.length === EMOTIONS.length) {
    const tribeTones = new Set(realTeam.map((item) => norm(getAttributeValue(item, "Skin Tone"))));
    const sameTribe = tribeTones.size === 1; // a full 7-orc single-colour team — any tribe
    if (sameTribe) {
      const sameTribeTotal = config.sameTribeBonus * realTeam.length;
      if (sameTribeTotal) {
        synergyScore += sameTribeTotal;
        synergyDetails.push({
          trait: `Full team: ${[...tribeTones][0]} tribe`,
          count: realTeam.length,
          bonus: sameTribeTotal
        });
      }
    }
  }

  synergyDetails.sort((a, b) => b.bonus - a.bonus || b.count - a.count || a.trait.localeCompare(b.trait, "ru"));

  const teamPower = realTeam.reduce((sum, item) => sum + item.power, 0);
  const totalScore = teamPower + synergyScore;

  return {
    teamPower,
    synergyScore,
    totalScore,
    coverage: realTeam.length,
    synergyDetails
  };
}

function buildBestTeam(items, config) {
  const legacyCap = Math.max(5, Math.min(24, Math.floor((config.searchWidth || 120) / 12)));
  const groups = EMOTIONS.map((emotion) =>
    items
      .filter((item) => item.emotion === emotion)
      .sort((a, b) => b.score - a.score || b.synergyTraits.length - a.synergyTraits.length)
      .slice(0, legacyCap)
  );

  let best = {
    team: Array(EMOTIONS.length).fill(null),
    result: evaluateTeam([], config)
  };

  function dfs(index, current) {
    if (index === groups.length) {
      const result = evaluateTeam(current, config);
      if (
        result.coverage > best.result.coverage ||
        (result.coverage === best.result.coverage && result.totalScore > best.result.totalScore)
      ) {
        best = { team: [...current], result };
      }
      return;
    }

    const candidates = groups[index];
    if (!candidates.length) {
      current.push(null);
      dfs(index + 1, current);
      current.pop();
      return;
    }

    for (const item of candidates) {
      current.push(item);
      dfs(index + 1, current);
      current.pop();
    }
  }

  dfs(0, []);
  return best;
}

async function fetchWalletCavernItems(walletAddress, config, onProgress) {
  const items = [];
  const seen = new Set();
  let offset = 0;
  let page = 0;
  const limit = 100;

  while (true) {
    const url = `https://tonapi.io/v2/accounts/${encodeURIComponent(walletAddress)}/nfts?limit=${limit}&offset=${offset}`;
    const data = await fetchJsonWithRetry(url, { headers: { accept: "application/json" } }, {
      maxAttempts: 5,
      onRetry(waitMs, attempt, retryReason) {
        onProgress(
          retryReason
            ? `${retryReason} Waiting ${Math.ceil(waitMs / 1000)}s and retrying wallet scan (${attempt}/5)...`
            : `Wallet scan retry ${attempt}/5...`,
          { page: page + 1, count: items.length }
        );
      }
    });
    const batch = Array.isArray(data?.nft_items) ? data.nft_items : [];

    for (const rawItem of batch) {
      const key = rawItem?.address;
      if (!key || seen.has(key)) {
        continue;
      }
      seen.add(key);
      if (isWalletCollectionMatch(rawItem) && rawItemMatchesFocus(rawItem, config)) {
        items.push(rawItem);
      }
    }

    onProgress(`Wallet scan: page ${page + 1} · found ${items.length} owned Cavern orcs...`, { page: page + 1, count: items.length });

    if (!batch.length || batch.length < limit) {
      break;
    }
    offset += batch.length;
    page += 1;
    await sleep(120);
  }

  return items;
}

async function fetchListedWalletMarketItems(config, onProgress) {
  const matchedItems = [];
  const seen = new Set();
  const totalCount = await fetchCollectionSize(KNOWN_GETGEMS_COLLECTIONS.unstoppabletribe);
  let offset = 0;
  let page = 0;
  const limit = 100;
  let checkedCount = 0;

  while (true) {
    const url = `https://tonapi.io/v2/nfts/collections/${encodeURIComponent(KNOWN_GETGEMS_COLLECTIONS.unstoppabletribe)}/items?limit=${limit}&offset=${offset}`;
    const data = await fetchJsonWithRetry(url, { headers: { accept: "application/json" } }, {
      maxAttempts: 6,
      onRetry(waitMs, attempt, retryReason) {
        onProgress(
          retryReason
            ? `${retryReason} Waiting ${Math.ceil(waitMs / 1000)}s and retrying market scan (${attempt}/6)...`
            : `TonAPI 429 during market scan. Retrying (${attempt}/6)...`,
          { checkedCount, totalCount }
        );
      }
    });
    const batch = Array.isArray(data?.nft_items) ? data.nft_items : [];

    for (const rawItem of batch) {
      const key = rawItem?.address;
      if (!key || seen.has(key)) {
        continue;
      }
      seen.add(key);
      checkedCount += 1;
      if (rawItem?.sale?.price?.value && rawItemMatchesFocus(rawItem, config)) {
        matchedItems.push(rawItem);
      }
    }

    onProgress(
      `Market scan: checked ${formatNumber(checkedCount)}/${formatNumber(totalCount || checkedCount)} items · found ${matchedItems.length} listed Cavern orcs...`,
      { checkedCount, totalCount }
    );

    if (!batch.length || batch.length < limit) {
      break;
    }
    offset += batch.length;
    page += 1;
    await sleep(120);
  }

  return matchedItems;
}

function buildWalletMarketShortlist(items) {
  const selected = new Map();
  const overall = [...items].sort((a, b) => b.score - a.score || a.salePriceValue - b.salePriceValue);
  overall.slice(0, 36).forEach((item) => selected.set(item.address, item));
  EMOTIONS.forEach((emotion) => {
    overall
      .filter((item) => item.emotion === emotion)
      .slice(0, 14)
      .forEach((item) => selected.set(item.address, item));
  });
  return [...selected.values()].slice(0, 110);
}

function evaluateWalletPlanEntry(team, config) {
  const result = evaluateTeam(team, config);
  const keepItems = team.filter((item) => item && item.source === "owned");
  const buyItems = team.filter((item) => item && item.source === "market");
  const buyCost = buyItems.reduce((sum, item) => sum + Number(item.salePriceValue || 0), 0);
  return {
    team,
    result,
    keepItems,
    buyItems,
    buyCount: buyItems.length,
    buyCost
  };
}

function compareWalletPlanEntries(a, b) {
  return (
    b.result.coverage - a.result.coverage
    || b.result.totalScore - a.result.totalScore
    || a.buyCount - b.buyCount
    || a.buyCost - b.buyCost
    || b.result.synergyScore - a.result.synergyScore
  );
}

function buildWalletPlanReasons(currentEntry, finalEntry, candidate) {
  const reasons = [];
  const currentSlot = currentEntry?.team?.[EMOTIONS.indexOf(candidate.emotion)] || null;
  if (!currentSlot) {
    reasons.push(`Closes ${candidate.emotion} slot`);
  } else {
    reasons.push(`Upgrades ${candidate.emotion} slot over ${currentSlot.name}`);
    const slotGain = candidate.power - currentSlot.power;
    if (slotGain > 0) {
      reasons.push(`Adds +${formatNumber(slotGain)} base PWR before team bonuses`);
    }
  }
  const baseMap = new Map((currentEntry?.result?.synergyDetails || []).map((detail) => [detail.trait, detail]));
  for (const detail of finalEntry.result.synergyDetails) {
    const previous = baseMap.get(detail.trait);
    if (!previous) {
      reasons.push(`Activates ${detail.trait} (+${formatNumber(detail.bonus)})`);
    } else if (detail.bonus > previous.bonus) {
      reasons.push(`Boosts ${detail.trait} to +${formatNumber(detail.bonus)}`);
    }
  }
  if (candidate.numberPower > 0) reasons.push(`Includes Number Power +${formatNumber(candidate.numberPower)}`);
  if (candidate.localComboBonus > 0) reasons.push(`Includes Local Combo +${formatNumber(candidate.localComboBonus)}`);
  return [...new Set(reasons)].slice(0, 4);
}

async function buildBestWalletPlan(walletItems, marketItems, config, onProgress) {
  const shortlist = buildWalletMarketShortlist(marketItems);
  const unionItems = [...walletItems, ...shortlist];
  if (!unionItems.length) {
    return null;
  }

  const groups = EMOTIONS.map((emotion) =>
    buildEmotionCandidatePool(unionItems.filter((item) => item.emotion === emotion), config.searchWidth)
  );
  const beamWidth = Math.max(140, Math.min(2200, config.searchWidth * 7));
  let beam = [{
    ...evaluateWalletPlanEntry([], config),
    optimistic: getRemainingMaxPower(groups, 0)
  }];

  for (let index = 0; index < groups.length; index += 1) {
    const candidates = groups[index];
    const seen = new Map();

    if (!candidates.length) {
      beam = beam.map((entry) => {
        const team = [...entry.team, null];
        const result = evaluateWalletPlanEntry(team, config);
        return {
          ...result,
          optimistic: result.result.totalScore + getRemainingMaxPower(groups, index + 1)
        };
      });
      continue;
    }

    for (const entry of beam) {
      for (const item of candidates) {
        const team = [...entry.team, item];
        const result = evaluateWalletPlanEntry(team, config);
        const optimistic = result.result.totalScore + getRemainingMaxPower(groups, index + 1);
        const key = getTeamIdentity(team);
        const current = seen.get(key);
        const candidateEntry = { ...result, optimistic };
        if (!current || compareWalletPlanEntries(candidateEntry, current) < 0 || candidateEntry.optimistic > current.optimistic) {
          seen.set(key, candidateEntry);
        }
      }
    }

    beam = [...seen.values()]
      .sort((a, b) =>
        b.result.coverage - a.result.coverage
        || b.optimistic - a.optimistic
        || b.result.totalScore - a.result.totalScore
        || a.buyCount - b.buyCount
        || a.buyCost - b.buyCost
      )
      .slice(0, beamWidth);

    if (typeof onProgress === "function") {
      onProgress(`Building strongest keep + buy plan: emotion ${index + 1}/7...`, { step: index + 1, total: groups.length, beamSize: beam.length });
    }
    await sleep(0);
  }

  return beam
    .filter((entry) => entry.result.coverage > 0)
    .sort(compareWalletPlanEntries)[0] || null;
}

function buildWalletPlan(currentTeam, finalEntry) {
  if (!finalEntry) {
    return null;
  }
  const buyDetails = finalEntry.buyItems.map((item) => ({
    item,
    reasons: buildWalletPlanReasons(currentTeam, finalEntry, item)
  }));
  return {
    currentTeam,
    finalEntry,
    keepItems: finalEntry.keepItems,
    buyItems: finalEntry.buyItems,
    buyDetails,
    buyCount: finalEntry.buyCount,
    buyCost: finalEntry.buyCost,
    delta: finalEntry.result.totalScore - (currentTeam?.result?.totalScore || 0)
  };
}

async function runWalletAnalysis() {
  if (state.walletRunning) {
    return;
  }
  const button = document.getElementById("analyzeWalletBtn");
  const walletAddress = String(getElementValue("walletInput", "")).trim();
  if (!walletAddress) {
    setWalletStatus("Enter a TON wallet address first.", "err", 100);
    return;
  }
  state.walletRunning = true;
  resetStatusProgress("walletStatus");
  if (button) {
    button.disabled = true;
    button.textContent = "Analyzing...";
  }
  try {
    const config = getWalletConfig();
    setWalletStatus("Loading owned Cavern orcs from the wallet...", "warn", 0);
    const walletRaw = await fetchWalletCavernItems(walletAddress, config, (message, meta) => {
      setWalletStatus(message, "warn", getWalletOwnedFetchProgress(meta?.page || 0));
    });
    const walletItems = walletRaw
      .map((item) => ({ ...normalizeItem(item, config), source: "owned" }))
      .filter((item) => item.matchesFocus);
    let currentTeam = null;
    if (walletItems.length) {
      setWalletStatus(`Loaded ${walletItems.length} owned Cavern orcs. Building current owned team...`, "warn", 24);
      currentTeam = await buildBeamBestTeam(walletItems, config, (message, meta) => {
        setWalletStatus(`Owned team: ${message}`, "warn", getWalletOwnedBuildProgress(meta?.step || 0, meta?.total || 7));
      });
    } else {
      setWalletStatus("No owned Cavern orcs found. Building a market-assisted plan instead...", "warn", 44);
    }
    setWalletStatus("Scanning live listed Cavern market orcs...", "warn", 48);
    const marketRaw = await fetchListedWalletMarketItems(config, (message, meta) => {
      const progress = getWalletMarketFetchProgress(meta?.checkedCount || 0, meta?.totalCount || Math.max(meta?.checkedCount || 1, 1));
      setWalletStatus(message, "warn", progress);
    });
    const ownedSet = new Set(walletItems.map((item) => item.address));
    const marketItems = marketRaw
      .map((item) => ({ ...normalizeItem(item, config), source: "market" }))
      .filter((item) => item.matchesFocus && !ownedSet.has(item.address) && item.salePriceValue > 0);
    setWalletStatus(`Loaded ${marketItems.length} listed Cavern orcs. Building the strongest keep + buy plan...`, "warn", 80);
    const finalEntry = await buildBestWalletPlan(walletItems, marketItems, config, (message, meta) => {
      setWalletStatus(message, "warn", getWalletPlanBuildProgress(meta?.step || 0, meta?.total || 1));
    });
    const walletPlan = buildWalletPlan(currentTeam, finalEntry);
    state.walletItems = walletItems;
    state.walletMarketItems = marketItems;
    state.walletCurrentTeam = currentTeam;
    state.walletPlan = walletPlan;
    renderWalletSummary(walletItems, currentTeam, marketItems, walletPlan);
    renderWalletCurrentTeam(currentTeam);
    renderWalletOwnedGrid(walletItems);
    renderWalletPlan(walletPlan);
    if (!walletItems.length && (!walletPlan || !walletPlan.finalEntry)) {
      setWalletStatus("No Cavern orcs were found in this wallet or in the current listed market sample.", "err", 100);
      return;
    }
    if (!walletItems.length) {
      setWalletStatus(`Done: no owned Cavern orcs found, but built a market-assisted plan with ${walletPlan?.buyCount || 0} buys.`, "ok", 100);
      return;
    }
    setWalletStatus(`Done: loaded ${walletItems.length} owned Cavern orcs and built a final plan with ${walletPlan?.buyCount || 0} buys from ${marketItems.length} listed candidates.`, "ok", 100);
  } catch (error) {
    console.error(error);
    setWalletStatus(error.message || "Failed to analyze wallet.", "err", 100);
  } finally {
    state.walletRunning = false;
    if (button) {
      button.disabled = false;
      button.textContent = "Analyze Wallet";
    }
  }
}

async function fetchWalletClanItems(walletAddress, onProgress) {
  const items = [];
  const seen = new Set();
  let offset = 0, page = 0;
  const limit = 100;
  const maxPages = 40; // safety cap
  const col = KNOWN_GETGEMS_COLLECTIONS.unstoppabletribe;
  while (page < maxPages) {
    // server-side collection filter → only tribe orcs, no paging through whale wallets
    const url = `https://tonapi.io/v2/accounts/${encodeURIComponent(walletAddress)}/nfts?collection=${encodeURIComponent(col)}&limit=${limit}&offset=${offset}`;
    const data = await fetchJsonWithRetry(url, { headers: { accept: "application/json" } }, {
      maxAttempts: 5,
      onRetry(waitMs, attempt) { onProgress(`Скан кошелька: повтор ${attempt}/5...`); }
    });
    const batch = Array.isArray(data?.nft_items) ? data.nft_items : [];
    for (const rawItem of batch) {
      const key = rawItem?.address;
      if (!key || seen.has(key)) continue;
      seen.add(key);
      items.push(rawItem);
    }
    onProgress(`Скан кошелька · страница ${page + 1} · найдено орков: ${items.length}...`);
    if (!batch.length || batch.length < limit) break;
    offset += batch.length; page += 1; await sleep(100);
  }
  return items;
}

async function fetchListedClanMarketItems(onProgress) {
  const matched = [];
  const seen = new Set();
  const totalCount = await fetchCollectionSize(KNOWN_GETGEMS_COLLECTIONS.unstoppabletribe);
  let offset = 0, page = 0, checked = 0;
  const limit = 100;
  while (true) {
    const url = `https://tonapi.io/v2/nfts/collections/${encodeURIComponent(KNOWN_GETGEMS_COLLECTIONS.unstoppabletribe)}/items?limit=${limit}&offset=${offset}`;
    const data = await fetchJsonWithRetry(url, { headers: { accept: "application/json" } }, {
      maxAttempts: 6,
      onRetry(waitMs, attempt) { onProgress(`Скан рынка: повтор ${attempt}/6...`, checked, totalCount); }
    });
    const batch = Array.isArray(data?.nft_items) ? data.nft_items : [];
    for (const rawItem of batch) {
      const key = rawItem?.address;
      if (!key || seen.has(key)) continue;
      seen.add(key); checked += 1;
      if (rawItem?.sale?.price?.value) matched.push(rawItem);
    }
    onProgress(`Market scan: ${formatNumber(checked)}/${formatNumber(totalCount || checked)} · ${matched.length} listed orcs...`, checked, totalCount);
    if (!batch.length || batch.length < limit) break;
    offset += batch.length; page += 1; await sleep(120);
  }
  return matched;
}

// ── skin tone (tribe) helpers — a team must be one single color ──
function orcTone(item) { return norm(getAttributeValue(item, "Skin Tone") || ""); }
function groupByTone(items) {
  const map = new Map();
  for (const it of items) {
    const t = orcTone(it);
    if (!t) continue;
    if (!map.has(t)) map.set(t, []);
    map.get(t).push(it);
  }
  return map;
}

// light, emotion-aligned single-color team builder (small beam → fast, no crashes)
function lightBestTeam(items, config) {
  const CAP = 5, W = 18;
  const groups = EMOTIONS.map((e) =>
    items.filter((i) => i.emotion === e).sort((a, b) => b.power - a.power).slice(0, CAP)
  );
  let beam = [[]];
  for (const cand of groups) {
    const pool = cand.length ? cand : [null];
    const next = [];
    for (const team of beam) for (const it of pool) next.push([...team, it]);
    next.sort((a, b) => evaluateTeam(b, config).totalScore - evaluateTeam(a, config).totalScore);
    beam = next.slice(0, W);
  }
  let best = beam[0] || [];
  let bestScore = evaluateTeam(best, config).totalScore;
  for (const t of beam) { const s = evaluateTeam(t, config).totalScore; if (s > bestScore) { bestScore = s; best = t; } }
  return { team: best, result: evaluateTeam(best, config) };
}

function teamScore(team, config) { return evaluateTeam(team, config).totalScore; }
function withSlot(team, e, orc) { const t = team.slice(); t[e] = orc; return t; }

// COMPLETE (7-orc, single-color) teams buildable from one color group, best-first.
function colorCompleteTeams(group, config, limit) {
  const out = [];
  const used = new Set();
  for (let k = 0; k < limit; k += 1) {
    const remaining = group.filter((it) => !used.has(it.address));
    if (remaining.length < EMOTIONS.length) break;
    const r = lightBestTeam(remaining, config);
    if (r.result.coverage !== EMOTIONS.length) break; // STRICTLY 7 — anything less is not a team
    out.push({ team: r.team, result: r.result, score: r.result.totalScore });
    r.team.filter(Boolean).forEach((o) => used.add(o.address));
  }
  return out;
}

// a member's top-N COMPLETE teams across all their colors (the only thing that counts)
function memberCompleteTeams(items, config, n) {
  const all = [];
  for (const [tone, group] of groupByTone(items)) {
    colorCompleteTeams(group, config, n).forEach((t) => all.push({ ...t, tone }));
  }
  return all.sort((a, b) => b.score - a.score).slice(0, n);
}
// kept name/signature for callers (now returns complete teams only)
async function buildClanMemberTeams(items, config, n) { return memberCompleteTeams(items, config, n); }

// rich per-member snapshot for fast incremental value deltas
function clanMemberState(items, config) {
  const byTone = new Map();
  for (const [tone, group] of groupByTone(items)) {
    const teams = colorCompleteTeams(group, config, 3);
    const covered = new Set(group.map((o) => o.emotion));
    byTone.set(tone, { group, teams, scores: teams.map((t) => t.score), covered });
  }
  const all = [];
  for (const [tone, v] of byTone) v.scores.forEach((s) => all.push({ s, tone }));
  all.sort((a, b) => b.s - a.s);
  const top = all.slice(0, 3);
  const value = top.reduce((acc, x) => acc + x.s, 0);
  const topColors = new Set(top.map((x) => x.tone)); // the colors of the member's fielded top-3 teams
  const nComplete = all.length;                       // how many complete teams they can field
  return { items, byTone, value, topColors, nComplete };
}

// clan value = Σ each member's top-3 complete teams; recompute one color, re-merge top-3
function valueWithColorScores(state, tone, newScores) {
  const all = [];
  let replaced = false;
  for (const [t, v] of state.byTone) {
    if (t === tone) { newScores.forEach((s) => all.push(s)); replaced = true; }
    else v.scores.forEach((s) => all.push(s));
  }
  if (!replaced) newScores.forEach((s) => all.push(s));
  all.sort((a, b) => b - a);
  return all.slice(0, 3).reduce((s, x) => s + x, 0);
}
function colorScoresAfter(state, tone, removeAddr, addOrc, config) {
  const cur = state.byTone.get(tone);
  let group = cur ? cur.group.slice() : [];
  if (removeAddr) group = group.filter((o) => o.address !== removeAddr);
  if (addOrc) group = [...group, addOrc];
  return colorCompleteTeams(group, config, 3).map((t) => t.score);
}
// member value delta from removing one orc and/or adding one orc (same color)
function deltaRemoveAdd(state, tone, removeAddr, addOrc, config) {
  const newScores = colorScoresAfter(state, tone, removeAddr, addOrc, config);
  return valueWithColorScores(state, tone, newScores) - state.value;
}
// value delta from just adding an orc (its color only)
function addValueGain(state, orc, config) {
  const tone = orcTone(orc);
  const newScores = colorScoresAfter(state, tone, null, orc, config);
  return { gain: valueWithColorScores(state, tone, newScores) - state.value, tone, newScores };
}

function orcSynergyTokens(item) {
  const s = new Set();
  const e = getAttributeValue(item, "Earrings"); if (e) s.add("e:" + norm(e));
  const b = getAttributeValue(item, "Bracelet"); if (b) s.add("b:" + norm(b));
  for (const m of item.logoMatches) s.add("l:" + m.token);
  return s;
}
function rosterTokenSet(items) { const s = new Set(); for (const it of items) for (const t of orcSynergyTokens(it)) s.add(t); return s; }
function orcSharesToken(item, set) { for (const t of orcSynergyTokens(item)) if (set.has(t)) return true; return false; }

async function runClanAnalysis() {
  if (clanState.running) return;
  const wallets = getClanWallets();
  if (!wallets.length) { setClanStatus("Paste at least one TON wallet first.", "err", 100); return; }
  clanState.running = true;
  const btn = document.getElementById("analyzeClanBtn");
  btn.disabled = true; btn.textContent = "Анализ...";
  document.getElementById("clanSwapBtn").disabled = true;
  document.getElementById("clanMarketBtn").disabled = true;
  resetStatusProgress("clanStatus");
  const config = getClanConfig();
  const members = [];
  try {
    for (let i = 0; i < wallets.length; i += 1) {
      const w = wallets[i];
      setClanCellState(w.index, "run");
      const base = Math.round((i / wallets.length) * 100);
      setClanStatus(`Участник ${w.index + 1}/${wallets.length}: сканирование кошелька...`, "warn", base);
      let raw;
      try {
        raw = await fetchWalletClanItems(w.addr, (msg) => setClanStatus(`Member ${w.index + 1}: ${msg}`, "warn", base));
      } catch (e) {
        setClanCellState(w.index, "err");
        continue;
      }
      const items = raw.map((it) => normalizeItem(it, config));
      if (!items.length) { setClanCellState(w.index, "warn"); continue; }
      setClanStatus(`Участник ${w.index + 1}: строим топ-3 команды из ${items.length} орков...`, "warn", base + 3);
      const teams = await buildClanMemberTeams(items, config, 3, () => {});
      members.push({ index: w.index, addr: w.addr, nick: w.nick, items, teams });
      setClanCellState(w.index, "ok");
    }
    clanState.members = members;
    clanState.swapDone = false; // market stays locked until swap runs
    clanState.marketRaw = null; // fresh clan → re-scan market once
    renderClanSummary();
    renderClanMembers();
    if (!members.length) {
      setClanStatus("В кошельках не найдено орков Unstoppable Tribe.", "err", 100);
    } else {
      document.getElementById("clanSwapBtn").disabled = false;
      const mkt = document.getElementById("clanMarketBtn");
      mkt.disabled = false; mkt.classList.remove("ready"); // clickable, but guarded by popup until swap done
      setClanStatus(`Готово: проанализировано участников — ${members.length}. Сначала запустите ① Анализ обменов.`, "ok", 100);
      setClanActionStatus("Клан просканирован. Сначала ① Анализ обменов — рынок откроется после него.", "ok", 100);
      document.getElementById("clan-members").scrollIntoView({ behavior: "smooth", block: "start" });
    }
  } catch (error) {
    console.error(error);
    setClanStatus(error.message || "Анализ клана не удался.", "err", 100);
  } finally {
    clanState.running = false;
    btn.disabled = false; btn.textContent = "Анализ клана";
  }
}

// why a trade helps: the synergy it creates/upgrades, else raw slot power
function moveReason(beforeTeam, afterTeam, config) {
  const bd = new Map();
  evaluateTeam(beforeTeam || [], config).synergyDetails.forEach((d) => bd.set(d.trait, d.bonus));
  let best = null;
  for (const d of evaluateTeam(afterTeam || [], config).synergyDetails) {
    const was = bd.get(d.trait) || 0;
    if (d.bonus > was && (!best || d.bonus - was > best.delta)) best = { trait: d.trait, count: d.count, bonus: d.bonus, delta: d.bonus - was };
  }
  if (best) {
    const label = best.trait.replace(/^Earrings?:/i, "Серьги:").replace(/^Logo:/i, "Лого:").replace(/^Bracelet:/i, "Браслет:");
    return `закрывает синергию ${label} ×${best.count} (+${formatNumber(best.bonus)})`;
  }
  return "ставит в слот более сильного орка";
}
function cap1(s) { return String(s || "").replace(/\b\w/g, (c) => c.toUpperCase()); }
// note when a move pushes a NEW color team into the member's top-3, displacing another
function displaceNote(beforeColors, afterColors) {
  const entered = [...afterColors].filter((c) => !beforeColors.has(c));
  const left = [...beforeColors].filter((c) => !afterColors.has(c));
  if (!entered.length || !left.length) return "";
  return `команда ${cap1(entered[0])} входит в топ-3 игрока и вытесняет команду ${cap1(left[0])}`;
}

async function runClanSwapAnalysis() {
  if (clanState.running || !clanState.members.length) return;
  clanState.running = true;
  const btn = document.getElementById("clanSwapBtn");
  btn.disabled = true; btn.textContent = "Анализ...";
  resetStatusProgress("clanActionStatus");
  const config = getClanConfig();
  const rosters = clanState.members.map((m) => ({ index: m.index, addr: m.addr, items: [...m.items] }));
  const transfers = [];
  const MAX = 14;     // hill-climb passes
  try {
    // value of the clan = Σ each member's top-3 COMPLETE (7-orc) teams. Partial/leftover orcs = 0.
    let states = rosters.map((r) => clanMemberState(r.items, config));
    const baseline = states.reduce((s, st) => s + st.value, 0);
    const moved = new Set(); // every orc trades AT MOST once across the whole plan
    const bestCTeam = (st, C) => { const v = st.byTone.get(C); return v && v.teams[0] ? v.teams[0] : null; };

    for (let iter = 0; iter < MAX; iter += 1) {
      setClanActionStatus(`Анализ обменов: проход ${iter + 1}...`, "warn", Math.round((iter / MAX) * 100));
      let best = null;
      const consider = (cand) => { if (cand.total > 1e-6 && (!best || cand.total > best.total)) best = cand; };

      // pool of tradable orcs indexed by color|emotion
      const poolCE = new Map();
      for (let mi = 0; mi < rosters.length; mi += 1) {
        for (const o of rosters[mi].items) {
          if (moved.has(o.address)) continue;
          const key = `${orcTone(o)}|${o.emotion}`;
          if (!poolCE.has(key)) poolCE.set(key, []);
          poolCE.get(key).push({ orc: o, owner: mi });
        }
      }
      poolCE.forEach((arr) => arr.sort((x, y) => y.orc.power - x.orc.power));

      // colors a member can RECEIVE into: any color where they field a full team or are one short.
      // A new color may enter the top-3 (displacing a weaker team) — that's allowed and is
      // explained on the move ("this team enters your top-3, replaces …").
      const recvColors = states.map((st) => {
        const set = new Set();
        for (const [C, v] of st.byTone) if (v.teams.length || v.covered.size >= EMOTIONS.length - 1) set.add(C);
        return set;
      });

      for (let ti = 0; ti < rosters.length; ti += 1) {
        // (1) ONE-WAY: bring an orc from another wallet to improve / complete one of T's real teams.
        //     A donor may lose power — accepted as long as the CLAN total rises.
        for (const C of recvColors[ti]) {
          for (let e = 0; e < EMOTIONS.length; e += 1) {
            const arr = poolCE.get(`${C}|${EMOTIONS[e]}`);
            if (!arr) continue;
            let tried = 0;
            for (const { orc: Y, owner: di } of arr) {
              if (di === ti) continue;
              if (tried++ >= 5) break; // top few candidates per slot
              const gT = addValueGain(states[ti], Y, config).gain;
              if (gT <= 0) continue;
              const gD = deltaRemoveAdd(states[di], orcTone(Y), Y.address, null, config); // ≤ 0
              const net = gT + gD;
              if (net > 0) consider({ kind: "give", total: net, recv: ti, donor: di, orc: Y, tone: C, gT, gD });
            }
          }
        }
        await sleep(0);
      }

      // (2) TWO-WAY: swap the same role between two members' full same-color teams — net clan rise.
      const colorMembers = new Map();
      for (let ti = 0; ti < states.length; ti += 1) for (const [C, v] of states[ti].byTone) {
        if (!v.teams.length) continue;
        if (!colorMembers.has(C)) colorMembers.set(C, []);
        colorMembers.get(C).push(ti);
      }
      for (const [C, mem] of colorMembers) {
        for (let x = 0; x < mem.length; x += 1) for (let y = x + 1; y < mem.length; y += 1) {
          const ti = mem[x], tj = mem[y];
          const Ki = bestCTeam(states[ti], C), Kj = bestCTeam(states[tj], C);
          if (!Ki || !Kj) continue;
          for (let e = 0; e < EMOTIONS.length; e += 1) {
            const oI = Ki.team[e], oJ = Kj.team[e];
            if (!oI || !oJ || oI.address === oJ.address) continue;
            if (moved.has(oI.address) || moved.has(oJ.address)) continue;
            const gI = deltaRemoveAdd(states[ti], C, oI.address, oJ, config);
            const gJ = deltaRemoveAdd(states[tj], C, oJ.address, oI, config);
            const net = gI + gJ;
            if (net > 0) consider({ kind: "swap", total: net, i: ti, j: tj, orcI: oI, orcJ: oJ, tone: C, gI, gJ });
          }
        }
        await sleep(0);
      }

      if (!best) break;

      // capture before-teams, apply, recompute, capture after-teams
      if (best.kind === "give") {
        const T = rosters[best.recv], D = rosters[best.donor], C = best.tone;
        const beforeRecv = (bestCTeam(states[best.recv], C) || {}).team || [];
        const beforeRecvScore = (bestCTeam(states[best.recv], C) || {}).score || 0;
        const beforeColors = new Set(states[best.recv].topColors);
        D.items = D.items.filter((it) => it.address !== best.orc.address);
        T.items = [...T.items, best.orc];
        moved.add(best.orc.address);
        states[best.recv] = clanMemberState(T.items, config);
        states[best.donor] = clanMemberState(D.items, config);
        const afterRecv = (bestCTeam(states[best.recv], C) || {}).team || [];
        const afterRecvScore = (bestCTeam(states[best.recv], C) || {}).score || 0;
        const gReason = moveReason(beforeRecv, afterRecv, config);
        const gDisp = displaceNote(beforeColors, states[best.recv].topColors);
        const gExplain = `${labelForIndex(D.index)} отдаёт ${best.orc.name} игроку ${labelForIndex(T.index)}: ${gReason} в команде ${cap1(C)} у ${labelForIndex(T.index)} (${formatNumber(beforeRecvScore)} → ${formatNumber(afterRecvScore)} PWR). Прирост клана +${formatNumber(best.total)} PWR.${gDisp ? " " + gDisp + "." : ""}`;
        transfers.push({
          kind: "give", total: best.total, tone: C, orcA: best.orc,
          fromIndex: D.index, toIndex: T.index,
          bBefore: beforeRecv, bAfter: afterRecv, bBeforeScore: beforeRecvScore, bAfterScore: afterRecvScore,
          reason: gReason, displace: gDisp, explain: gExplain
        });
      } else {
        const I = rosters[best.i], J = rosters[best.j], C = best.tone;
        const beI = (bestCTeam(states[best.i], C) || {}); const beJ = (bestCTeam(states[best.j], C) || {});
        I.items = I.items.filter((it) => it.address !== best.orcI.address).concat(best.orcJ);
        J.items = J.items.filter((it) => it.address !== best.orcJ.address).concat(best.orcI);
        moved.add(best.orcI.address); moved.add(best.orcJ.address);
        states[best.i] = clanMemberState(I.items, config);
        states[best.j] = clanMemberState(J.items, config);
        const afI = (bestCTeam(states[best.i], C) || {}); const afJ = (bestCTeam(states[best.j], C) || {});
        transfers.push({
          kind: "swap", total: best.total, tone: C, orcA: best.orcI, orcB: best.orcJ,
          aIndex: I.index, bIndex: J.index, gA: best.gI, gB: best.gJ,
          aBefore: beI.team || [], aAfter: afI.team || [], aBeforeScore: beI.score || 0, aAfterScore: afI.score || 0,
          bBefore: beJ.team || [], bAfter: afJ.team || [], bBeforeScore: beJ.score || 0, bAfterScore: afJ.score || 0,
          reasonA: moveReason(beI.team || [], afI.team || [], config),
          reasonB: moveReason(beJ.team || [], afJ.team || [], config),
          explain: `${labelForIndex(I.index)} и ${labelForIndex(J.index)} меняются ${best.orcI.name} ↔ ${best.orcJ.name} в командах ${cap1(C)}: у ${labelForIndex(I.index)} ${moveReason(beI.team || [], afI.team || [], config)} (${formatNumber(beI.score || 0)} → ${formatNumber(afI.score || 0)}), у ${labelForIndex(J.index)} ${moveReason(beJ.team || [], afJ.team || [], config)} (${formatNumber(beJ.score || 0)} → ${formatNumber(afJ.score || 0)}). Прирост клана +${formatNumber(best.total)} PWR.`
        });
      }
    }

    const after = states.reduce((s, st) => s + st.value, 0);
    const planGain = after - baseline;
    clanState.swapDone = true;
    const mkt = document.getElementById("clanMarketBtn");
    if (mkt) { mkt.disabled = false; mkt.classList.add("ready"); }
    renderClanSwaps(transfers, planGain, baseline, after);
    document.getElementById("clan-swaps").scrollIntoView({ behavior: "smooth", block: "start" });
    setClanActionStatus(transfers.length ? `Найдено выгодных ходов: ${transfers.length}, +${formatNumber(planGain)} к силе клана (только полные команды). Анализ рынка разблокирован.` : "Выгодных обменов между полными командами нет — клан уже оптимально распределён. Анализ рынка разблокирован.", "ok", 100);
  } catch (error) {
    console.error(error);
    setClanActionStatus(error.message || "Анализ обменов не удался.", "err", 100);
  } finally {
    clanState.running = false;
    btn.disabled = false; btn.textContent = "① Анализ обменов (синергии)";
  }
}

function bestExclTone(info, T) {
  let m = 0;
  for (const [t, v] of info.byTone) if (t !== T && v.score > m) m = v.score;
  return m;
}
function looseOrcs(info, items) {
  const used = new Set();
  for (const [, v] of info.byTone) v.team.filter(Boolean).forEach((it) => used.add(it.address));
  return items.filter((it) => !used.has(it.address));
}

function diffSets(before, after) {
  const b = new Set((before || []).filter(Boolean).map((it) => it.address));
  const a = new Set((after || []).filter(Boolean).map((it) => it.address));
  return { removed: new Set([...b].filter((x) => !a.has(x))), added: new Set([...a].filter((x) => !b.has(x))) };
}
function baBlock(label, beforeTeam, afterTeam, beforeScore, afterScore) {
  const d = diffSets(beforeTeam, afterTeam);
  return `
    <div class="clan-ba-col">
      <div class="clan-ba-lbl">${escapeHtml(label)} — До · ${formatNumber(beforeScore)} PWR</div>
      ${swapTeamMiniHTML(beforeTeam, d.removed, "removed")}
    </div>
    <div class="clan-ba-col">
      <div class="clan-ba-lbl">После · ${formatNumber(afterScore)} PWR</div>
      ${swapTeamMiniHTML(afterTeam, d.added, "added")}
    </div>`;
}

function renderClanSwaps(transfers, totalGain, before, after) {
  const grid = document.getElementById("clanSwapGrid");
  const summary = document.getElementById("clanSwapSummary");
